<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Aparkapp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; width: 100%; background: #0a1628; overflow: hidden; }
    :root {
      --ap-bg: #0a1628; --ap-surface: #0f2040; --ap-card: #152a52;
      --ap-border: rgba(255,255,255,0.09); --ap-accent: #94C52F; --ap-blue: #11396D;
      --ap-blue-light: #1a4f96; --ap-text: #F1EFE8; --ap-muted: #7a9bc0;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    #app {
      position: fixed; inset: 0;
      max-width: 480px; margin: 0 auto;
      display: flex; flex-direction: column;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px; background: var(--ap-bg); color: var(--ap-text);
    }
    .topbar {
      background: var(--ap-blue); border-bottom: 0.5px solid rgba(148,197,47,0.2);
      padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; padding-top: max(12px, env(safe-area-inset-top));
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
    .logo span { color: var(--ap-accent); }
    .role-toggle { display: flex; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 3px; gap: 2px; }
    .role-btn { padding: 5px 13px; border-radius: 18px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.5); background: transparent; font-family: inherit; }
    .role-btn.active { background: var(--ap-accent); color: #0a1628; }
    #main-content { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .tab-bar { background: var(--ap-surface); display: flex; border-bottom: 0.5px solid var(--ap-border); flex-shrink: 0; }
    .tab { flex: 1; padding: 10px 0; text-align: center; font-size: 12px; font-weight: 500; color: var(--ap-muted); cursor: pointer; border-bottom: 2px solid transparent; }
    .tab.active { color: var(--ap-accent); border-bottom-color: var(--ap-accent); }

    /* WELCOME */
    .welcome-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; background: linear-gradient(160deg, #11396D 0%, #0a1628 100%); }
    .welcome-hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px 28px; gap: 12px; min-height: 0; overflow: hidden; }
    .welcome-btns { flex-shrink: 0; padding: 16px 20px; padding-bottom: calc(24px + var(--safe-bottom)); display: flex; flex-direction: column; gap: 10px; }

    /* SCROLLABLE SCREENS */
    .screen-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; }
    .ob-screen { padding: 20px 18px; display: flex; flex-direction: column; gap: 14px; padding-bottom: calc(24px + var(--safe-bottom)); }
    @keyframes fadeIn { from { opacity:0; transform:translateX(8px); } to { opacity:1; transform:translateX(0); } }
    .ob-screen { animation: fadeIn 0.2s ease; }
    .progress-bar { height: 3px; background: var(--ap-card); flex-shrink: 0; }
    .progress-fill { height: 100%; background: var(--ap-accent); transition: width 0.4s ease; border-radius: 2px; }
    .ob-icon { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .ob-icon.accent { background: rgba(148,197,47,0.15); }
    .ob-icon.blue { background: rgba(17,57,109,0.4); border: 0.5px solid rgba(148,197,47,0.2); }
    .ob-title { font-size: 20px; font-weight: 700; color: var(--ap-text); line-height: 1.3; }
    .ob-sub { font-size: 13px; color: var(--ap-muted); line-height: 1.6; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 11px; color: var(--ap-muted); font-weight: 500; letter-spacing: 0.3px; }
    .form-input { background: var(--ap-card); border: 0.5px solid var(--ap-border); border-radius: 8px; padding: 12px; color: var(--ap-text); font-size: 15px; outline: none; width: 100%; -webkit-appearance: none; font-family: inherit; }
    .form-input:focus { border-color: var(--ap-accent); }
    .form-input::placeholder { color: var(--ap-muted); }
    .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; -webkit-appearance: none; }
    .btn-primary { background: var(--ap-accent); color: #0a1628; }
    .btn-secondary { background: var(--ap-card); color: var(--ap-text); border: 0.5px solid rgba(148,197,47,0.25); }
    .btn-confirm { background: var(--ap-accent); color: #0a1628; }
    .ob-link { text-align: center; font-size: 13px; color: var(--ap-muted); cursor: pointer; }
    .ob-link span { color: var(--ap-accent); }
    .step-back { font-size: 13px; color: var(--ap-muted); cursor: pointer; }
    .social-row { display: flex; gap: 8px; }
    .social-btn { flex: 1; padding: 12px; border-radius: 10px; border: 0.5px solid var(--ap-border); background: var(--ap-card); color: var(--ap-text); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: inherit; }
    .divider { display: flex; align-items: center; gap: 10px; }
    .divider-line { flex: 1; height: 0.5px; background: var(--ap-border); }
    .divider-text { font-size: 11px; color: var(--ap-muted); }
    .fee-card { background: var(--ap-card); border-radius: 12px; border: 0.5px solid rgba(148,197,47,0.2); padding: 14px 16px; }
    .fee-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 0.5px solid var(--ap-border); }
    .fee-row:last-child { border-bottom: none; padding-top: 10px; }
    .fee-label { font-size: 12px; color: var(--ap-muted); }
    .fee-val { font-size: 13px; color: var(--ap-text); }
    .fee-total-val { font-size: 19px; font-weight: 700; color: var(--ap-accent); }
    .fee-strike { font-size: 11px; color: var(--ap-muted); text-decoration: line-through; margin-right: 4px; }
    .launch-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(148,197,47,0.12); border-radius: 10px; padding: 2px 8px; font-size: 10px; color: var(--ap-accent); font-weight: 600; }
    .info-box { background: rgba(148,197,47,0.07); border: 0.5px solid rgba(148,197,47,0.2); border-radius: 10px; padding: 10px 12px; font-size: 12px; color: #b8dc6a; line-height: 1.5; }
    .info-box.blue { background: rgba(17,57,109,0.3); border-color: rgba(148,197,47,0.15); color: var(--ap-muted); }
    .card-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .otp-row { display: flex; gap: 8px; justify-content: center; }
    .otp-input { width: 44px; height: 54px; background: var(--ap-card); border: 0.5px solid var(--ap-border); border-radius: 10px; text-align: center; font-size: 24px; font-weight: 700; color: var(--ap-text); outline: none; -webkit-appearance: none; font-family: inherit; }
    .otp-input:focus { border-color: var(--ap-accent); }
    .otp-input.filled { border-color: rgba(148,197,47,0.5); }
    .upload-zone { border: 1px dashed rgba(148,197,47,0.3); border-radius: 12px; padding: 24px 16px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .upload-zone.done { border-color: var(--ap-accent); background: rgba(148,197,47,0.06); }
    .upload-label { font-size: 13px; color: var(--ap-muted); }
    .upload-label strong { color: var(--ap-text); display: block; margin-bottom: 2px; }
    .check-badge { width: 22px; height: 22px; border-radius: 50%; background: var(--ap-accent); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; color: #0a1628; }
    .selfie-frame { border-radius: 12px; background: var(--ap-card); height: 150px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; border: 0.5px solid var(--ap-border); cursor: pointer; }
    .face-outline { width: 76px; height: 90px; border: 2px solid rgba(148,197,47,0.5); border-radius: 50%; position: relative; overflow: hidden; }
    .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--ap-accent), transparent); animation: scan 2s ease-in-out infinite; }
    @keyframes scan { 0%,100%{top:10px;opacity:0.3} 50%{top:70px;opacity:1} }
    .terms-scroll { background: var(--ap-card); border-radius: 10px; border: 0.5px solid var(--ap-border); padding: 12px 14px; max-height: 160px; overflow-y: auto; font-size: 12px; color: var(--ap-muted); line-height: 1.7; -webkit-overflow-scrolling: touch; }
    .terms-scroll h4 { color: var(--ap-text); font-size: 12px; font-weight: 600; margin: 10px 0 4px; }
    .terms-scroll h4:first-child { margin-top: 0; }
    .check-row { display: flex; gap: 10px; align-items: flex-start; cursor: pointer; padding: 4px 0; }
    .custom-check { width: 22px; height: 22px; border-radius: 6px; border: 0.5px solid var(--ap-border); background: var(--ap-card); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
    .custom-check.on { background: var(--ap-accent); border-color: var(--ap-accent); color: #0a1628; }
    .check-text { font-size: 13px; color: var(--ap-muted); line-height: 1.5; }
    .check-text span { color: var(--ap-accent); }
    .verified-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(148,197,47,0.12); border-radius: 12px; padding: 5px 12px; font-size: 12px; color: var(--ap-accent); font-weight: 600; }

    /* APP SCREENS */
    .app-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; position: relative; }
    .map-area { position: relative; height: 200px; background: #0a1e3a; flex-shrink: 0; overflow: hidden; }
    .map-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(148,197,47,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(148,197,47,0.04) 1px,transparent 1px); background-size: 36px 36px; }
    .map-road-h { position: absolute; left:0; right:0; height:10px; background:rgba(17,57,109,0.6); }
    .map-road-v { position: absolute; top:0; bottom:0; width:10px; background:rgba(17,57,109,0.6); }
    .map-label { position:absolute; font-size:10px; color:var(--ap-muted); font-weight:500; white-space:nowrap; }
    .map-pin { position:absolute; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; cursor:pointer; border:2px solid var(--ap-bg); }
    .map-pin.available { background:var(--ap-accent); color:#0a1628; }
    .map-pin.selected { background:var(--ap-accent); box-shadow:0 0 0 5px rgba(148,197,47,0.25); }
    .map-pin.taken { background:var(--ap-card); color:var(--ap-muted); }
    .user-dot { position:absolute; width:14px; height:14px; border-radius:50%; background:var(--ap-blue-light); border:2px solid white; }
    .map-overlay { position:absolute; top:10px; left:10px; background:var(--ap-blue); border-radius:8px; padding:6px 10px; font-size:11px; color:var(--ap-muted); border:0.5px solid rgba(148,197,47,0.2); }
    .map-overlay strong { color:var(--ap-text); }
    .search-bar { padding:10px 14px; background:var(--ap-surface); border-bottom:0.5px solid var(--ap-border); display:flex; gap:8px; align-items:center; flex-shrink: 0; }
    .search-input { flex:1; background:var(--ap-card); border:0.5px solid var(--ap-border); border-radius:8px; padding:10px 12px; color:var(--ap-text); font-size:14px; outline:none; -webkit-appearance:none; font-family:inherit; }
    .search-input::placeholder { color:var(--ap-muted); }
    .filter-pill { padding:7px 11px; border-radius:20px; border:0.5px solid var(--ap-border); background:var(--ap-card); font-size:11px; color:var(--ap-muted); cursor:pointer; white-space:nowrap; }
    .filter-pill.on { border-color:var(--ap-accent); color:var(--ap-accent); background:rgba(148,197,47,0.08); }
    .list-section { padding:12px 14px; }
    .section-label { font-size:11px; font-weight:600; color:var(--ap-muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px; }
    .spot-card { background:var(--ap-card); border-radius:12px; border:0.5px solid var(--ap-border); padding:12px 14px; margin-bottom:10px; cursor:pointer; display:flex; gap:12px; align-items:flex-start; }
    .spot-card.selected { border-color:var(--ap-accent); }
    .spot-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .spot-icon.bldg { background:rgba(148,197,47,0.12); }
    .spot-icon.home { background:rgba(17,57,109,0.5); }
    .spot-info { flex:1; min-width:0; }
    .spot-name { font-size:13px; font-weight:600; color:var(--ap-text); margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .spot-meta { font-size:11px; color:var(--ap-muted); display:flex; gap:8px; flex-wrap:wrap; }
    .spot-badge { font-size:10px; padding:2px 7px; border-radius:10px; background:rgba(148,197,47,0.15); color:var(--ap-accent); font-weight:600; }
    .spot-right { text-align:right; flex-shrink:0; }
    .spot-price { font-size:15px; font-weight:700; color:var(--ap-accent); }
    .spot-unit { font-size:10px; color:var(--ap-muted); }
    .spot-dist { font-size:11px; color:var(--ap-muted); margin-top:2px; }
    .stars { color:var(--ap-accent); font-size:10px; }
    .booking-panel { position:absolute; bottom:0; left:0; right:0; background:var(--ap-surface); border-top:0.5px solid rgba(148,197,47,0.2); border-radius:16px 16px 0 0; padding:16px; padding-bottom:calc(16px + var(--safe-bottom)); z-index:10; animation:slideUp 0.25s ease; }
    @keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
    .panel-title { font-size:14px; font-weight:600; margin-bottom:12px; color:var(--ap-text); display:flex; justify-content:space-between; align-items:center; }
    .close-btn { color:var(--ap-muted); cursor:pointer; font-size:22px; line-height:1; }
    .time-select { display:flex; gap:6px; margin-bottom:12px; }
    .time-opt { flex:1; padding:10px 0; border-radius:8px; border:0.5px solid var(--ap-border); background:var(--ap-card); font-size:14px; color:var(--ap-muted); cursor:pointer; text-align:center; font-family:inherit; }
    .time-opt.on { border-color:var(--ap-accent); color:var(--ap-accent); background:rgba(148,197,47,0.08); }
    .price-summary { background:var(--ap-card); border-radius:10px; padding:12px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
    .price-label { font-size:12px; color:var(--ap-muted); }
    .price-total { font-size:22px; font-weight:700; color:var(--ap-accent); }
    .qr-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:2px; width:80px; }
    .qr-cell { width:8px; height:8px; border-radius:1px; }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .stat-card { background:var(--ap-card); border-radius:12px; border:0.5px solid var(--ap-border); padding:12px; }
    .stat-label { font-size:11px; color:var(--ap-muted); margin-bottom:6px; }
    .stat-val { font-size:20px; font-weight:700; color:var(--ap-text); }
    .stat-val.accent { color:var(--ap-accent); }
    .bar-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .bar-day { font-size:10px; color:var(--ap-muted); width:18px; }
    .bar-track { flex:1; height:6px; background:var(--ap-bg); border-radius:3px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:3px; background:var(--ap-accent); }
    .bar-amt { font-size:10px; color:var(--ap-muted); width:36px; text-align:right; }
    .toggle-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:0.5px solid var(--ap-border); }
    .toggle-label { font-size:13px; color:var(--ap-text); }
    .toggle-sw { width:44px; height:24px; border-radius:12px; cursor:pointer; transition:background 0.2s; position:relative; flex-shrink:0; }
    .toggle-sw.on { background:var(--ap-accent); }
    .toggle-sw.off { background:var(--ap-card); border:0.5px solid var(--ap-border); }
    .toggle-knob { position:absolute; width:18px; height:18px; border-radius:50%; background:white; top:3px; transition:left 0.2s; }
    .toggle-sw.on .toggle-knob { left:23px; }
    .toggle-sw.off .toggle-knob { left:3px; }
    .chip { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:10px; font-size:11px; font-weight:600; }
    .chip-on { background:rgba(148,197,47,0.15); color:var(--ap-accent); }
    .chip-off { background:rgba(17,57,109,0.4); color:var(--ap-muted); }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">Aparkapp<span>.</span></div>
    <div id="topbar-right"></div>
  </div>
  <div id="main-content"></div>
</div>
<script>
let step='welcome', role='driver', driverTab='search', hostTab='dash';
let selectedSpot=null, bookingStep='list', selectedTime=2;
let checks={terms:false,privacy:false,seguro:false};
let otpVals=['','','','','',''];
let selfieState='idle', idFront=false, idBack=false;

const spots=[
  {id:1,name:'Parqueadero Chapinero',type:'bldg',price:3200,unit:'hora',dist:'180m',rating:4.8,reviews:42,available:true,pin:{x:'38%',y:'35%'}},
  {id:2,name:'Cupo residencial · Altos',type:'home',price:2500,unit:'hora',dist:'220m',rating:4.6,reviews:18,available:true,pin:{x:'55%',y:'28%'}},
  {id:3,name:'Parking Zona Rosa',type:'bldg',price:4000,unit:'hora',dist:'1.2km',rating:4.9,reviews:87,available:true,pin:{x:'72%',y:'55%'}},
  {id:4,name:'Cupo privado · Torres',type:'home',price:1800,unit:'hora',dist:'650m',rating:4.4,reviews:11,available:false,pin:{x:'25%',y:'62%'}},
];

const go=s=>{step=s;render();};
const stars=n=>'<span class="stars">'+'★'.repeat(Math.round(n))+'</span>';

function setRole(r){
  role=r;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  const b=document.getElementById('btn-'+r);
  if(b)b.classList.add('active');
  renderApp();
}

function renderTopbar(){
  const el=document.getElementById('topbar-right');
  if(step==='app'){
    el.innerHTML=`<div class="role-toggle">
      <button class="role-btn${role==='driver'?' active':''}" id="btn-driver" onclick="setRole('driver')">Conductor</button>
      <button class="role-btn${role==='host'?' active':''}" id="btn-host" onclick="setRole('host')">Anfitrión</button>
    </div>`;
  } else { el.innerHTML=''; }
}

function render(){
  renderTopbar();
  const mc=document.getElementById('main-content');

  if(step==='welcome'){
    mc.innerHTML=`<div class="welcome-wrap">
      <div class="welcome-hero">
        <div style="font-size:48px;line-height:1">🚗</div>
        <div style="font-size:28px;font-weight:700;color:#fff;letter-spacing:-1px">Aparkapp<span style="color:#94C52F">.</span></div>
        <div style="font-size:14px;color:rgba(255,255,255,0.55);line-height:1.6;max-width:240px">Conectamos conductores con cupos de parqueo privados en Bogotá.</div>
        <div style="display:flex;gap:16px">
          <div style="font-size:11px;color:rgba(148,197,47,0.85)">🔒 Verificado</div>
          <div style="font-size:11px;color:rgba(148,197,47,0.85)">🛡 Asegurado</div>
          <div style="font-size:11px;color:rgba(148,197,47,0.85)">⭐ Calificado</div>
        </div>
      </div>
      <div class="welcome-btns">
        <button class="btn btn-primary" onclick="go('register')">Crear cuenta</button>
        <button class="btn btn-secondary" onclick="go('register')">Ya tengo cuenta · Iniciar sesión</button>
      </div>
    </div>`;
    return;
  }

  if(step==='register'){
    mc.innerHTML=`<div style="flex-shrink:0"><div class="progress-bar"><div class="progress-fill" style="width:12%"></div></div></div>
    <div class="screen-wrap"><div class="ob-screen">
      <div class="step-back" onclick="go('welcome')">← Volver</div>
      <div class="ob-icon accent">👤</div>
      <div class="ob-title">Crear tu cuenta</div>
      <div class="ob-sub">Ingresa tus datos para empezar a usar Aparkapp.</div>
      <div class="social-row">
        <button class="social-btn" onclick="go('phone_otp')">🇬 Google</button>
        <button class="social-btn" onclick="go('phone_otp')">📘 Facebook</button>
      </div>
      <div class="divider"><div class="divider-line"></div><div class="divider-text">o con email</div><div class="divider-line"></div></div>
      <div class="form-group"><div class="form-label">Nombre completo</div><input class="form-input" placeholder="Luis Carlos Medina"/></div>
      <div class="form-group"><div class="form-label">Correo electrónico</div><input class="form-input" type="email" placeholder="luis@correo.com"/></div>
      <div class="form-group"><div class="form-label">Número de celular</div>

    el.innerHTML=`<div style="padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:24px">
      <div class="section-label">Nuevo cupo</div>
      <div class="form-group"><div class="form-label">Tipo de espacio</div>
        <select class="form-input"><option>Cupo residencial (garaje)</option><option>Propiedad horizontal (PH)</option><option>Parqueadero independiente</option></select>
      </div>
      <div class="form-group"><div class="form-label">Dirección</div><input class="form-input" placeholder="Cra 13 #63-45, Chapinero"/></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="form-group"><div class="form-label">Precio/hora</div><input class="form-input" placeholder="$2.500" type="number" inputmode="numeric"/></div>
        <div class="form-group"><div class="form-label">Núm. cupos</div><input class="form-input" placeholder="1" type="number" inputmode="numeric"/></div>
      </div>
      <div class="form-group"><div class="form-label">Horario</div>
        <select class="form-input"><option>Lun–Vie 8am–6pm</option><option>Todos los días 24h</option><option>Fines de semana</option></select>
      </div>
      <div class="form-group"><div class="form-label">Características</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
          ${['Techado','Vigilancia','Iluminado','24h','Cámaras'].map(c=>`<div class="filter-pill" onclick="this.classList.toggle('on')">${c}</div>`).join('')}
        </div>
      </div>
      <button class="btn btn-primary" onclick="showAddOk()">Publicar cupo</button>
      <div id="add-ok" style="display:none" class="info-box">✓ ¡Cupo publicado! Ya aparece en el mapa.</div>
    </div>`;
  } else {
    el.innerHTML=`<div style="padding:14px;display:flex;flex-direction:column;gap:10px;padding-bottom:24px">
      <div class="section-label">Reservas de hoy</div>
      ${[{d:'Carlos M.',p:'BJK 421',h:'2:00–4:00 PM',e:'En curso',v:'$5.000'},
         {d:'Andrea L.',p:'QWE 987',h:'4:30–5:30 PM',e:'Próxima',v:'$2.500'},
         {d:'Felipe R.',p:'TUV 345',h:'7:00–9:00 PM',e:'Próxima',v:'$5.000'}].map(r=>`
      <div class="spot-card" style="cursor:default">
        <div style="width:40px;height:40px;border-radius:50%;background:rgba(148,197,47,0.12);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#94C52F;flex-shrink:0">${r.d.split(' ').map(w=>w[0]).join('')}</div>
        <div class="spot-info"><div class="spot-name">${r.d} · ${r.p}</div><div class="spot-meta">${r.h}</div><div style="margin-top:4px"><span class="chip ${r.e==='En curso'?'chip-on':'chip-off'}">${r.e==='En curso'?'● ':''} ${r.e}</span></div></div>
        <div class="spot-right"><div class="spot-price" style="font-size:13px">${r.v}</div></div>
      </div>`).join('')}
      <div class="toggle-row"><span class="toggle-label">Aceptar automáticamente</span><div class="toggle-sw off" onclick="this.classList.toggle('on');this.classList.toggle('off')"><div class="toggle-knob"></div></div></div>
      <div class="toggle-row"><span class="toggle-label">Notificar nueva reserva</span><div class="toggle-sw on" onclick="this.classList.toggle('on');this.classList.toggle('off')"><div class="toggle-knob"></div></div></div>
    </div>`;
  }
}

function selectSpot(id){selectedSpot=id;selectedTime=2;renderDriver();}
function closePanel(){selectedSpot=null;renderDriver();}
function selectTime(t){selectedTime=t;renderDriver();}
function confirmBooking(){bookingStep='success';renderDriver();}
function resetDriver(){bookingStep='list';selectedSpot=null;renderDriver();}
function handleOtp(i,v){otpVals[i]=v.slice(-1);if(v&&i<5){const n=document.getElementById('otp-'+(i+1));if(n)n.focus();}render();}
function handleOtpKey(e,i){if(e.key==='Backspace'&&!otpVals[i]&&i>0){otpVals[i-1]='';const p=document.getElementById('otp-'+(i-1));if(p)p.focus();render();}}
function fillOtpAndNext(){otpVals=['4','2','7','8','1','9'];go('verify_fee');}
function toggleCheck(k){checks[k]=!checks[k];render();}
function takeSelfie(){if(selfieState==='idle'){selfieState='scanning';render();setTimeout(()=>{selfieState='done';render();},2000);}else if(selfieState==='done'){go('terms');}}
function showAddOk(){const el=document.getElementById('add-ok');if(el)el.style.display='block';}

render();
</script>
</body>
</html>
